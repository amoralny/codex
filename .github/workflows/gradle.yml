 (cd "$(git rev-parse --show-toplevel)" && git apply --3way <<'EOF' 
diff --git a/app.js b/app.js
new file mode 100644
index 0000000000000000000000000000000000000000..db5017318fc977c57291a8d300aa17e9c3ab28c1
--- /dev/null
+++ b/app.js
@@ -0,0 +1,234 @@
+const ABILITIES = ["STR", "DEX", "CON", "INT", "WIS", "CHA"];
+const STORAGE_KEY = "dnd5e-character";
+
+const creatorForm = document.getElementById("creator-form");
+const creatorSection = document.getElementById("creator");
+const sheetSection = document.getElementById("sheet");
+const abilityInputs = document.getElementById("ability-inputs");
+const abilitySheet = document.getElementById("ability-sheet");
+const coreInfo = document.getElementById("core-info");
+const sheetTitle = document.getElementById("sheet-title");
+const inventoryForm = document.getElementById("inventory-form");
+const inventoryList = document.getElementById("inventory-list");
+const spellForm = document.getElementById("spell-form");
+const spellList = document.getElementById("spell-list");
+
+let character = null;
+
+function modifier(score) {
+  return Math.floor((Number(score) - 10) / 2);
+}
+
+function formatModifier(score) {
+  const mod = modifier(score);
+  return mod >= 0 ? `+${mod}` : `${mod}`;
+}
+
+function createAbilityInputs() {
+  ABILITIES.forEach((ability) => {
+    const label = document.createElement("label");
+    label.innerHTML = `${ability}<input type="number" min="1" max="30" name="${ability}" value="10" required />`;
+    abilityInputs.appendChild(label);
+  });
+}
+
+function buildCharacterFromForm(form) {
+  const formData = new FormData(form);
+  const core = Object.fromEntries(formData.entries());
+  const abilities = Object.fromEntries(
+    ABILITIES.map((ability) => [ability, Number(core[ability])])
+  );
+
+  ABILITIES.forEach((ability) => delete core[ability]);
+
+  return {
+    ...core,
+    level: Number(core.level),
+    xp: Number(core.xp),
+    proficiency: Number(core.proficiency),
+    armorClass: Number(core.armorClass),
+    initiative: Number(core.initiative),
+    speed: Number(core.speed),
+    maxHp: Number(core.maxHp),
+    currentHp: Number(core.currentHp),
+    tempHp: Number(core.tempHp),
+    abilities,
+    inventory: [],
+    spells: [],
+  };
+}
+
+function renderCoreInfo() {
+  const entries = [
+    ["Player", character.player],
+    ["Race", character.race],
+    ["Class", character.className],
+    ["Background", character.background],
+    ["Alignment", character.alignment],
+    ["Level", character.level],
+    ["XP", character.xp],
+    ["Proficiency Bonus", `+${character.proficiency}`],
+    ["Armor Class", character.armorClass],
+    ["Initiative", character.initiative >= 0 ? `+${character.initiative}` : character.initiative],
+    ["Speed", `${character.speed} ft.`],
+    ["Max HP", character.maxHp],
+    ["Current HP", character.currentHp],
+    ["Temp HP", character.tempHp],
+    ["Hit Dice", character.hitDice],
+  ];
+
+  coreInfo.innerHTML = entries
+    .map(([label, value]) => `<div><strong>${label}:</strong> ${value}</div>`)
+    .join("");
+}
+
+function renderAbilities() {
+  abilitySheet.innerHTML = ABILITIES.map((ability) => {
+    const score = character.abilities[ability] ?? 10;
+    return `
+      <div class="stat-card">
+        <p><strong>${ability}</strong></p>
+        <p>Score: ${score}</p>
+        <p>Modifier: ${formatModifier(score)}</p>
+      </div>
+    `;
+  }).join("");
+}
+
+function renderList(listNode, items, formatter, onRemove) {
+  if (!items.length) {
+    listNode.innerHTML = `<li>No entries yet.</li>`;
+    return;
+  }
+
+  listNode.innerHTML = "";
+  items.forEach((item, index) => {
+    const li = document.createElement("li");
+    li.innerHTML = `
+      <span>${formatter(item)}</span>
+      <button class="remove" data-index="${index}" type="button">Remove</button>
+    `;
+    li.querySelector("button").addEventListener("click", () => onRemove(index));
+    listNode.appendChild(li);
+  });
+}
+
+function saveCharacter() {
+  localStorage.setItem(STORAGE_KEY, JSON.stringify(character));
+}
+
+function renderSheet() {
+  if (!character) return;
+  sheetTitle.textContent = `${character.name} (${character.className} ${character.level})`;
+  renderCoreInfo();
+  renderAbilities();
+  renderList(
+    inventoryList,
+    character.inventory,
+    (item) => `${item.name} x${item.quantity}${item.notes ? ` — ${item.notes}` : ""}`,
+    (index) => {
+      character.inventory.splice(index, 1);
+      saveCharacter();
+      renderSheet();
+    }
+  );
+  renderList(
+    spellList,
+    character.spells,
+    (spell) => `${spell.name} (Lv ${spell.level}, ${spell.school})${spell.details ? ` — ${spell.details}` : ""}`,
+    (index) => {
+      character.spells.splice(index, 1);
+      saveCharacter();
+      renderSheet();
+    }
+  );
+}
+
+function showSheetView() {
+  creatorSection.classList.add("hidden");
+  sheetSection.classList.remove("hidden");
+}
+
+function showCreatorView() {
+  creatorSection.classList.remove("hidden");
+  sheetSection.classList.add("hidden");
+}
+
+creatorForm.addEventListener("submit", (event) => {
+  event.preventDefault();
+  character = buildCharacterFromForm(creatorForm);
+  saveCharacter();
+  renderSheet();
+  showSheetView();
+});
+
+inventoryForm.addEventListener("submit", (event) => {
+  event.preventDefault();
+  const name = document.getElementById("inventory-name").value.trim();
+  const quantity = Number(document.getElementById("inventory-qty").value);
+  const notes = document.getElementById("inventory-notes").value.trim();
+
+  if (!name || !quantity) return;
+  character.inventory.push({ name, quantity, notes });
+  saveCharacter();
+  renderSheet();
+  inventoryForm.reset();
+  document.getElementById("inventory-qty").value = "1";
+});
+
+spellForm.addEventListener("submit", (event) => {
+  event.preventDefault();
+  const name = document.getElementById("spell-name").value.trim();
+  const level = Number(document.getElementById("spell-level").value);
+  const school = document.getElementById("spell-school").value.trim();
+  const details = document.getElementById("spell-details").value.trim();
+
+  if (!name || !school || level < 0 || level > 9) return;
+  character.spells.push({ name, level, school, details });
+  saveCharacter();
+  renderSheet();
+  spellForm.reset();
+  document.getElementById("spell-level").value = "0";
+});
+
+document.getElementById("edit-core").addEventListener("click", () => {
+  showCreatorView();
+  Object.entries(character).forEach(([key, value]) => {
+    if (key === "abilities" || key === "inventory" || key === "spells") return;
+    const input = creatorForm.elements.namedItem(key);
+    if (input) input.value = value;
+  });
+  ABILITIES.forEach((ability) => {
+    const input = creatorForm.elements.namedItem(ability);
+    if (input) input.value = character.abilities[ability];
+  });
+});
+
+document.getElementById("reset-character").addEventListener("click", () => {
+  localStorage.removeItem(STORAGE_KEY);
+  character = null;
+  creatorForm.reset();
+  ABILITIES.forEach((ability) => {
+    const input = creatorForm.elements.namedItem(ability);
+    if (input) input.value = "10";
+  });
+  document.getElementById("inventory-qty").value = "1";
+  document.getElementById("spell-level").value = "0";
+  showCreatorView();
+});
+
+function loadCharacter() {
+  const stored = localStorage.getItem(STORAGE_KEY);
+  if (!stored) return;
+
+  try {
+    character = JSON.parse(stored);
+    renderSheet();
+    showSheetView();
+  } catch {
+    localStorage.removeItem(STORAGE_KEY);
+  }
+}
+
+createAbilityInputs();
+loadCharacter();
 
EOF
)# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# This workflow will build a Java project with Gradle and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-gradle

name: Java CI with Gradle

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # Configure Gradle for optimal use in GitHub Actions, including caching of downloaded dependencies.
    # See: https://github.com/gradle/actions/blob/main/setup-gradle/README.md
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0

    - name: Build with Gradle Wrapper
      run: ./gradlew build

    # NOTE: The Gradle Wrapper is the default and recommended way to run Gradle (https://docs.gradle.org/current/userguide/gradle_wrapper.html).
    # If your project does not have the Gradle Wrapper configured, you can use the following configuration to run Gradle with a specified version.
    #
    # - name: Setup Gradle
    #   uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0
    #   with:
    #     gradle-version: '8.9'
    #
    # - name: Build with Gradle 8.9
    #   run: gradle build

  dependency-submission:

    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # Generates and submits a dependency graph, enabling Dependabot Alerts for all project dependencies.
    # See: https://github.com/gradle/actions/blob/main/dependency-submission/README.md
    - name: Generate and submit dependency graph
      uses: gradle/actions/dependency-submission@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0
